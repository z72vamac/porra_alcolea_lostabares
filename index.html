<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Porra del Grupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">⚽ Porra Pro</h1>
            <p class="text-green-600 font-bold text-lg">Cuota: 2€</p>
        </div>

        <form id="porraForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Tu Nombre / Alias</label>
                <input type="text" id="nombre" class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ej: Manolo" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 text-center">Marcador Exacto</label>
                <div class="flex items-center justify-center gap-4 mt-2">
                    <input type="number" id="local" class="w-20 p-3 text-center text-2xl border rounded-xl" placeholder="0" min="0" required>
                    <span class="text-2xl font-bold">-</span>
                    <input type="number" id="visitante" class="w-20 p-3 text-center text-2xl border rounded-xl" placeholder="0" min="0" required>
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl text-sm text-blue-800">
                📌 <b>Instrucciones:</b> Haz el Bizum de 2€ y dale a registrar. Si pagas en efectivo, avísame al entregar el dinero.
            </div>

            <button type="submit" id="btn" class="w-full bg-gray-900 text-white p-4 rounded-xl font-bold text-lg hover:bg-black transition">
                Registrar Apuesta
            </button>
        </form>
        <p id="msg" class="hidden mt-4 text-center font-bold text-green-600"></p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwYK3lIA6HAygDcdTokDVBjOquO6211rP5AxIe2CKgEGhpTJASLR_5qKR1XIMNM97AKdg/exec';
        const form = document.getElementById('porraForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "Registrando...";
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                marcador: document.getElementById('local').value + "-" + document.getElementById('visitante').value
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos)})
            .then(() => {
                document.getElementById('msg').innerText = "✅ ¡Registrado! Suerte.";
                document.getElementById('msg').classList.remove('hidden');
                form.reset();
                btn.innerText = "Registrar Apuesta";
                btn.disabled = false;
            })
            .catch(() => alert("Error al conectar con el Excel."));
        });
    </script>
</body>
</html>
